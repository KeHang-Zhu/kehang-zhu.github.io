<!-- Shared BibTeX modal + Abstract/Bibtex behaviour for publication lists -->
<div class="bib-modal" id="bibModal" hidden>
  <div class="bib-modal__backdrop" data-bib-close></div>
  <div class="bib-modal__dialog" role="dialog" aria-modal="true" aria-label="BibTeX citation">
    <div class="bib-modal__head">
      <strong>BibTeX</strong>
      <button class="bib-modal__close" type="button" data-bib-close aria-label="Close">&times;</button>
    </div>
    <pre class="bib-modal__body" id="bibModalBody"></pre>
    <div class="bib-modal__actions">
      <button class="paper-btn" type="button" id="bibCopy">Copy</button>
      <button class="paper-btn" type="button" id="bibDownload">Download</button>
    </div>
  </div>
</div>

<script>
(function () {
  var modal = document.getElementById('bibModal');
  if (!modal) return;
  var body = document.getElementById('bibModalBody');
  var currentName = 'citation';

  function openBib(text, name) {
    body.textContent = text;
    currentName = name || 'citation';
    modal.removeAttribute('hidden');
    document.body.style.overflow = 'hidden';
  }
  function closeBib() {
    modal.setAttribute('hidden', '');
    document.body.style.overflow = '';
  }

  document.addEventListener('click', function (e) {
    var absBtn = e.target.closest('[data-abstract-toggle]');
    if (absBtn) {
      e.preventDefault();
      var panel = document.getElementById(absBtn.getAttribute('data-abstract-toggle'));
      if (panel) {
        if (panel.hasAttribute('hidden')) { panel.removeAttribute('hidden'); absBtn.classList.add('is-active'); }
        else { panel.setAttribute('hidden', ''); absBtn.classList.remove('is-active'); }
      }
      return;
    }
    var bibBtn = e.target.closest('[data-bibtex-toggle]');
    if (bibBtn) {
      e.preventDefault();
      var src = document.getElementById(bibBtn.getAttribute('data-bibtex-toggle'));
      if (src) openBib(src.textContent.replace(/^\s+|\s+$/g, ''), bibBtn.getAttribute('data-bibtex-name'));
      return;
    }
    if (e.target.closest('[data-bib-close]')) { closeBib(); }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !modal.hasAttribute('hidden')) closeBib();
  });

  var copyBtn = document.getElementById('bibCopy');
  copyBtn.addEventListener('click', function () {
    var btn = this, orig = btn.textContent, text = body.textContent;
    function done() { btn.textContent = 'Copied'; setTimeout(function () { btn.textContent = orig; }, 1200); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, done);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (err) {}
      document.body.removeChild(ta); done();
    }
  });

  document.getElementById('bibDownload').addEventListener('click', function () {
    var blob = new Blob([body.textContent], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = (currentName || 'citation') + '.bib';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
})();
</script>
